name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        run: bash scripts/build-app.sh "${{ steps.version.outputs.version }}"

      - name: Create release and upload tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Tardy ${{ github.ref_name }}" \
            --generate-notes \
            ".build/app/Tardy-${{ steps.version.outputs.version }}.tar.gz"

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL=".build/app/Tardy-${VERSION}.tar.gz"
          SHA256=$(shasum -a 256 "$TARBALL" | cut -d' ' -f1)

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nikp29/homebrew-tardy.git /tmp/homebrew-tardy
          cd /tmp/homebrew-tardy

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/tardy.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/tardy.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tardy.rb
          git commit -m "Update tardy to v${VERSION}"
          git push
